<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>光影對決｜輸入玩家名稱</title>
  <link rel="stylesheet" href="css/name.css">
</head>
<body class="name-page intro-pending">
  <div class="intro-overlay" id="intro-overlay" aria-hidden="false">
    <div class="intro-starfield" aria-hidden="true">
      <span class="star star-1"></span>
      <span class="star star-2"></span>
      <span class="star star-3"></span>
      <span class="star star-4"></span>
      <span class="star star-5"></span>
      <span class="star star-6"></span>
      <span class="star star-7"></span>
      <span class="star star-8"></span>
      <span class="meteor meteor-1"></span>
      <span class="meteor meteor-2"></span>
      <span class="meteor meteor-3"></span>
    </div>
    <div class="intro-grid" aria-hidden="true"></div>
    <div class="intro-energy intro-energy-left" aria-hidden="true"></div>
    <div class="intro-energy intro-energy-right" aria-hidden="true"></div>
    <button type="button" class="intro-start-button" id="intro-start-button" aria-label="點擊開始進入光影對決">
      <span class="intro-start-main">點擊空白處開始</span>
      <span class="intro-start-sub">進入光影對決遊戲</span>
    </button>
    <div class="intro-cinematic" id="intro-cinematic">
      <div class="intro-blackout"></div>
      <div class="intro-light-sweep"></div>
      <div class="intro-title-wrap">
        <div class="intro-title-glow"></div>
        <h1 class="intro-title" id="intro-title">光影對決</h1>
      </div>
    </div>
  </div>

  <main class="page-shell page-shell-hidden" id="page-shell">
    <section class="hero-panel" aria-label="遊戲標題區">
      <div class="hero-tech-rings" aria-hidden="true"></div>
      <div class="hero-badge">LIGHT × SHADOW</div>
      <h1 class="game-title">光影對決</h1>
      <p class="hero-subtitle">輸入你的名字，準備進入光影對決。</p>
    </section>

    <section class="form-panel" aria-labelledby="name-form-title">
      <div class="panel-card">
        <div class="panel-hud panel-hud-top" aria-hidden="true"></div>
        <div class="panel-hud panel-hud-bottom" aria-hidden="true"></div>
        <div class="panel-scanline" aria-hidden="true"></div>
        <h2 id="name-form-title">輸入玩家名稱</h2>
        <p class="panel-description">請先設定玩家名稱。</p>

        <form id="name-form" novalidate>
          <label class="input-label" for="player-name">玩家名字</label>

          <div class="input-wrap">
            <input
              id="player-name"
              name="playerName"
              type="text"
              maxlength="12"
              autocomplete="off"
              placeholder="請輸入名字"
              aria-describedby="name-rule name-error"
            >
            <span id="name-count" class="char-count">0/12</span>
          </div>

          <p id="name-rule" class="input-rule">允許：中文、英文、數字、底線（_）、減號（-）</p>
          <p id="name-error" class="error-message" role="alert" aria-live="polite"></p>

          <div class="name-preview" id="name-preview">目前顯示名稱：未設定</div>

          <div class="button-row">
            <button type="submit" class="primary-button">點擊開始</button>
            <button type="button" id="clear-name" class="secondary-button">清除</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <script src="js/storage.js"></script>
  <script src="js/audio-manager.js"></script>
  <script src="js/name.js"></script>
</body>
</html>
